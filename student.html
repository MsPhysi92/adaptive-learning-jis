<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Learning - Student Interface</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1a365d;
            --secondary: #2c5282;
            --accent: #ed8936;
            --accent-light: #fbd38d;
            --success: #38a169;
            --warning: #d69e2e;
            --danger: #e53e3e;
            --light: #f7fafc;
            --dark: #1a202c;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .header {
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 50%, #234876 100%);
            color: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 { font-size: 2rem; margin-bottom: 8px; }
        .header p { color: var(--accent-light); font-size: 1.1rem; }

        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e53e3e;
            animation: pulse 2s infinite;
        }

        .status-dot.connected { background: #38a169; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .phase-container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .phase-container.active { display: block; }

        .phase-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
        }

        .phase-header h2 { font-size: 1.8rem; margin-bottom: 8px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .form-group input {
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .level-badge {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 700;
            margin: 10px;
            font-size: 1.1rem;
        }

        .level-basic { background: linear-gradient(135deg, #bee3f8, #90cdf4); color: #2c5282; }
        .level-intermediate { background: linear-gradient(135deg, #fbd38d, #f6ad55); color: #7c2d12; }
        .level-advanced { background: linear-gradient(135deg, #fc8181, #f56565); color: #742a2a; }

        .question-card {
            background: var(--light);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .question-number {
            background: var(--accent);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: white;
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover:not(.answered) {
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .option.correct {
            background: linear-gradient(135deg, #f0fff4, #c6f6d5);
            border-color: var(--success);
        }

        .option.incorrect {
            background: linear-gradient(135deg, #fff5f5, #fed7d7);
            border-color: var(--danger);
        }

        .option-label {
            background: var(--primary);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .content-section {
            background: white;
            border-left: 5px solid var(--accent);
            padding: 25px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .content-section h3 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .content-section p { margin-bottom: 15px; }
        .content-section ul { margin-left: 20px; margin-bottom: 15px; }
        .content-section li { margin-bottom: 10px; }

        .formula-box {
            background: linear-gradient(135deg, #e8f4fd, #d6ebf7);
            border: 2px solid #3182ce;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
        }

        .highlight-box {
            background: linear-gradient(135deg, #fef5e7, #fdebd0);
            border-left: 4px solid var(--warning);
            padding: 15px 20px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent), var(--warning));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .btn-success { background: linear-gradient(135deg, var(--success), #48bb78); }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--warning));
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--dark);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }

        .toast.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="connection-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Connecting...</span>
    </div>

    <div class="container">
        <div class="header">
            <h1>Adaptive Learning System</h1>
            <p>Aalia Shaheen - JIS | Characteristics of Light</p>
        </div>

        <div id="toast" class="toast"></div>

        <!-- Registration Phase -->
        <div id="phaseReg" class="phase-container active">
            <div class="phase-header">
                <h2>👋 Welcome Student!</h2>
                <p>Let's get started with your adaptive learning journey</p>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Your Name *</label>
                    <input type="text" id="studentName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Class *</label>
                    <input type="text" id="studentClass" placeholder="e.g., 10-A" required>
                </div>
                <div class="form-group">
                    <label>Student ID *</label>
                    <input type="text" id="studentID" placeholder="Your student ID" required>
                </div>
                <div class="form-group">
                    <label>Email (optional)</label>
                    <input type="email" id="studentEmail" placeholder="your.email@example.com">
                </div>
            </div>

            <button class="btn btn-primary" id="btnRegister">Start My Journey →</button>
        </div>

        <!-- All other phases will be added dynamically -->
        <div id="content"></div>
    </div>

    <script>
        // WebSocket connection
        let ws = null;
        let studentData = {
            studentID: null,
            name: null,
            class: null,
            email: null,
            currentPhase: 'registration',
            currentQuestion: 0,
            level: 'basic',
            score: 0,
            journey: []
        };

        // Determine WebSocket URL
        function getWebSocketUrl() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host;
            
            // Handle different environments
            if (!host || host === '') {
                // Fallback for local file opening
                return 'ws://localhost:3000';
            }
            
            return `${wsProtocol}//${host}`;
        }

        function connectWebSocket() {
            const wsUrl = getWebSocketUrl();
            console.log('Connecting to:', wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('Connected to server');
                updateConnectionStatus(true);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log('Server message:', data);
            };

            ws.onclose = () => {
                console.log('Disconnected from server');
                updateConnectionStatus(false);
                // Reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateConnectionStatus(false);
            };
        }

        function updateConnectionStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (connected) {
                dot.classList.add('connected');
                text.textContent = 'Connected';
            } else {
                dot.classList.remove('connected');
                text.textContent = 'Connecting...';
            }
        }

        function sendToServer(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function captureScreen() {
            // Capture current view as base64 image
            const content = document.querySelector('.phase-container.active');
            if (!content) return;

            // Simple text capture instead of canvas for now
            const captureData = {
                phase: studentData.currentPhase,
                question: studentData.currentQuestion,
                level: studentData.level,
                timestamp: new Date().toISOString()
            };

            sendToServer({
                type: 'screen_capture',
                studentID: studentData.studentID,
                imageData: JSON.stringify(captureData)
            });
        }

        // Start screen capture every 3 seconds when registered
        let screenCaptureInterval = null;

        // Register button
        document.getElementById('btnRegister').addEventListener('click', function() {
            const name = document.getElementById('studentName').value.trim();
            const studentClass = document.getElementById('studentClass').value.trim();
            const studentID = document.getElementById('studentID').value.trim();
            const email = document.getElementById('studentEmail').value.trim();

            if (!name || !studentClass || !studentID) {
                showToast('❌ Please fill in all required fields');
                return;
            }

            studentData.name = name;
            studentData.class = studentClass;
            studentData.studentID = studentID;
            studentData.email = email;

            // Register with server
            sendToServer({
                type: 'register_student',
                studentID: studentID,
                name: name,
                class: studentClass,
                email: email
            });

            // Start screen capture
            screenCaptureInterval = setInterval(captureScreen, 3000);

            // Hide registration, show diagnostic
            document.getElementById('phaseReg').classList.remove('active');
            showToast('✅ Registered! Starting diagnostic...');
            startDiagnostic();
        });

        // Initialize WebSocket connection
        connectWebSocket();

        // Diagnostic and learning logic will go here...
        // (Reusing the same logic from standalone version but with WebSocket updates)

        function startDiagnostic() {
            studentData.currentPhase = 'diagnostic';
            sendToServer({
                type: 'student_update',
                studentID: studentData.studentID,
                update: { currentPhase: 'diagnostic', status: 'In diagnostic' }
            });

            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="phase-container active">
                    <div class="phase-header">
                        <h2>📊 Diagnostic Assessment</h2>
                        <p>Finding your optimal starting level...</p>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%">0%</div>
                    </div>
                    <div id="diagnosticQuestions"></div>
                </div>
            `;

            renderDiagnosticQuestion(0);
        }

        const diagnosticQuestions = [
            {
                text: 'What is light primarily composed of?',
                options: ['Light helps us see things', 'Electromagnetic waves', 'Oscillating electric and magnetic fields perpendicular to wave direction', 'Energy from the sun'],
                correct: 2,
                points: [1, 2, 3, 1]
            },
            {
                text: 'What is the speed of light in vacuum?',
                options: ['Very fast', '300,000 km/s', '3.00 × 10⁸ m/s (exact: 2.997924558 × 10⁸ m/s)', 'Depends on the color'],
                correct: 2,
                points: [1, 2, 3, 1]
            },
            {
                text: 'What happens when white light passes through a prism?',
                options: ['Light splits into colors', 'Dispersion occurs - different wavelengths refract at different angles', 'The prism colors the light', 'Light bounces back'],
                correct: 1,
                points: [2, 3, 1, 1]
            },
            {
                text: 'What is the relationship between frequency (f), wavelength (λ), and speed of light (c)?',
                options: ['They are not related', 'c = f × λ', 'Higher frequency means shorter wavelength', 'Frequency and wavelength are the same thing'],
                correct: 1,
                points: [1, 3, 2, 1]
            },
            {
                text: 'Which is NOT part of the electromagnetic spectrum?',
                options: ['X-rays', 'Sound waves', 'Infrared radiation', 'Ultraviolet light'],
                correct: 1,
                points: [2, 3, 2, 2]
            }
        ];

        let diagScore = 0;
        let diagCorrectCount = 0; // NEW: Track actual correct answers
        let currentDiagQ = 0;

        function renderDiagnosticQuestion(qIndex) {
            if (qIndex >= diagnosticQuestions.length) {
                finishDiagnostic();
                return;
            }

            const q = diagnosticQuestions[qIndex];
            const container = document.getElementById('diagnosticQuestions');
            
            const card = document.createElement('div');
            card.className = 'question-card';

            const opts = q.options.map((opt, i) => `
                <div class="option" data-index="${i}">
                    <div class="option-label">${String.fromCharCode(65 + i)}</div>
                    <div>${opt}</div>
                </div>
            `).join('');

            card.innerHTML = `
                <div class="question-number">Question ${qIndex + 1} of ${diagnosticQuestions.length}</div>
                <div class="question-text">${q.text}</div>
                <div class="options">${opts}</div>
            `;

            container.innerHTML = '';
            container.appendChild(card);

            card.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', function() {
                    if (this.classList.contains('answered')) return;

                    const selected = parseInt(this.dataset.index);
                    const isCorrect = selected === q.correct;

                    card.querySelectorAll('.option').forEach(o => {
                        o.classList.add('answered');
                        if (parseInt(o.dataset.index) === q.correct) {
                            o.classList.add('correct');
                        }
                    });

                    if (!isCorrect) this.classList.add('incorrect');

                    diagScore += q.points[selected];
                    if (isCorrect) diagCorrectCount++; // Track correct answers

                    // Update server
                    sendToServer({
                        type: 'student_update',
                        studentID: studentData.studentID,
                        update: {
                            currentQuestion: qIndex + 1,
                            lastAnswer: isCorrect ? 'Correct' : 'Incorrect'
                        }
                    });

                    const progress = Math.round(((qIndex + 1) / diagnosticQuestions.length) * 100);
                    document.querySelector('.progress-fill').style.width = progress + '%';
                    document.querySelector('.progress-fill').textContent = progress + '%';

                    setTimeout(() => {
                        currentDiagQ++;
                        renderDiagnosticQuestion(currentDiagQ);
                    }, 1500);
                });
            });

            studentData.currentQuestion = qIndex;
        }

        function finishDiagnostic() {
            const totalQuestions = diagnosticQuestions.length;
            const correctPercentage = (diagCorrectCount / totalQuestions) * 100;

            // NEW LOGIC: Based on actual correct answers
            // 5/5 or 4/5 correct (80-100%) = Advanced
            // 3/5 correct (60%) = Intermediate  
            // 0-2/5 correct (0-40%) = Basic

            let level = 'basic';
            if (diagCorrectCount >= 4) {
                level = 'advanced';  // 4 or 5 correct
            } else if (diagCorrectCount >= 3) {
                level = 'intermediate';  // 3 correct
            } else {
                level = 'basic';  // 0, 1, or 2 correct
            }

            studentData.level = level;
            studentData.score = Math.round(correctPercentage);

            sendToServer({
                type: 'student_update',
                studentID: studentData.studentID,
                update: {
                    currentPhase: 'learning',
                    level: level,
                    diagnosticScore: Math.round(correctPercentage),
                    correctAnswers: diagCorrectCount,
                    totalQuestions: totalQuestions
                }
            });

            showToast(`✅ Level: ${level.toUpperCase()} (${diagCorrectCount}/${totalQuestions} correct)`);
            
            setTimeout(() => {
                startLearning();
            }, 2000);
        }

        function startLearning() {
            studentData.currentPhase = 'learning';
            
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="phase-container active">
                    <div class="phase-header">
                        <h2>📚 Your Learning Path</h2>
                        <p>Content customized for your level</p>
                    </div>
                    <div style="text-align: center; margin: 30px 0;">
                        <h3 style="color: var(--primary); margin-bottom: 15px;">Your Level:</h3>
                        <span class="level-badge level-${studentData.level}">${studentData.level.toUpperCase()}</span>
                    </div>
                    ${getLearningContent(studentData.level)}
                    <button class="btn btn-success" onclick="moveTo('core')">Continue to Core Instruction →</button>
                </div>
            `;
        }

        function getLearningContent(level) {
            const content = {
                basic: `
                    <div class="content-section">
                        <h3>Understanding Light - Foundation</h3>
                        <p>Light is electromagnetic radiation that can be detected by the human eye. White light contains all colors of the visible spectrum.</p>
                        <div class="highlight-box"><strong>The Visible Spectrum:</strong> Red, Orange, Yellow, Green, Blue, Violet</div>
                        <p><strong>How Light Travels:</strong> Light travels in straight lines called rays. This is why we can't see around corners.</p>
                        <p><strong>Sources:</strong> Natural (Sun, stars) and Artificial (bulbs, LEDs)</p>
                        <div class="formula-box">Speed of Light = 3 × 10⁸ m/s</div>
                    </div>
                `,
                intermediate: `
                    <div class="content-section">
                        <h3>Electromagnetic Waves</h3>
                        <p>Light consists of oscillating electric and magnetic fields perpendicular to each other and to the wave's direction.</p>
                        <p><strong>The Electromagnetic Spectrum:</strong></p>
                        <ul>
                            <li>Radio waves: λ > 30 cm</li>
                            <li>Visible light: 700 nm (red) > λ > 400 nm (violet)</li>
                            <li>Gamma rays: shortest wavelength, highest frequency</li>
                        </ul>
                        <div class="formula-box">c = f × λ<br><small>speed of light = frequency × wavelength</small></div>
                        <p>Higher frequency = shorter wavelength (inverse relationship)</p>
                    </div>
                `,
                advanced: `
                    <div class="content-section">
                        <h3>Advanced Wave Properties</h3>
                        <p><strong>Huygens' Principle:</strong> All points on a wave front act as point sources producing secondary wavelets.</p>
                        <p><strong>Ray Approximation:</strong> Light treated as straight lines perpendicular to wave fronts.</p>
                        <p><strong>Illuminance:</strong> Decreases as square of distance from source.</p>
                        <div class="formula-box">Illuminance ∝ 1/d²</div>
                        <p><strong>Precision:</strong> Light speed = 2.997924558 × 10⁸ m/s (error < 0.001%)</p>
                        <div class="highlight-box">For calculations, we use 3.00 × 10⁸ m/s for both vacuum and air.</div>
                    </div>
                `
            };
            return content[level];
        }

        function moveTo(phase) {
            studentData.currentPhase = phase;
            sendToServer({
                type: 'student_update',
                studentID: studentData.studentID,
                update: { currentPhase: phase }
            });

            if (phase === 'core') {
                showCoreInstruction();
            }
        }

        function showCoreInstruction() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="phase-container active">
                    <div class="phase-header" style="background: linear-gradient(135deg, var(--success), #48bb78);">
                        <h2>🎯 CORE INSTRUCTION</h2>
                        <p>All students converge here - Universal concepts</p>
                    </div>
                    <div class="content-section">
                        <h3>Essential Understanding: Characteristics of Light</h3>
                        <p><strong>1. Electromagnetic Waves:</strong> Light consists of oscillating electric and magnetic fields perpendicular to each other and to wave direction.</p>
                        <div class="formula-box">c = f × λ = 3.00 × 10⁸ m/s</div>
                        <p><strong>2. The Spectrum:</strong> Radio → Microwave → IR → Visible → UV → X-ray → Gamma</p>
                        <p><strong>3. Huygens' Principle:</strong> Wave fronts can be analyzed as point sources creating wavelets.</p>
                        <p><strong>4. Illuminance Law:</strong> Brightness decreases as 1/d²</p>
                        <div class="highlight-box">
                            <strong>Key Fact:</strong> All electromagnetic waves travel at light speed in vacuum but differ in wavelength and frequency.
                        </div>
                    </div>
                    <button class="btn btn-success" onclick="showCompletion()">I've Understood Core Concepts ✓</button>
                </div>
            `;
        }

        function showCompletion() {
            sendToServer({
                type: 'student_update',
                studentID: studentData.studentID,
                update: { currentPhase: 'complete', status: 'Completed' }
            });

            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="phase-container active">
                    <div class="phase-header" style="background: linear-gradient(135deg, var(--success), #48bb78);">
                        <h2>🎉 Journey Complete!</h2>
                        <p>Your teacher can see your full learning path</p>
                    </div>
                    <div class="content-section" style="text-align: center; padding: 50px 20px;">
                        <h2 style="color: var(--primary); margin-bottom: 20px;">Excellent Work!</h2>
                        <p style="font-size: 1.2rem; margin-bottom: 30px;">Your adaptive learning journey has been recorded.</p>
                        <div style="background: var(--light); padding: 30px; border-radius: 12px;">
                            <p><strong>Starting Level:</strong> ${studentData.level.toUpperCase()}</p>
                            <p><strong>Diagnostic Score:</strong> ${studentData.score}%</p>
                            <p><strong>Status:</strong> <span style="color: var(--success);">✓ Completed</span></p>
                        </div>
                    </div>
                </div>
            `;

            showToast('🎉 Journey complete!');
