<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Learning System - JIS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #1a365d;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #718096;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .teacher {
            color: #ed8936;
            font-weight: 700;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }

        .btn {
            padding: 20px 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
        }

        .btn-student {
            background: linear-gradient(135deg, #1a365d, #2c5282);
            color: white;
        }

        .btn-teacher {
            background: linear-gradient(135deg, #38a169, #48bb78);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .info {
            margin-top: 40px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #718096;
        }

        .emoji {
            font-size: 3rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">📚</div>
        <h1>Adaptive Learning System</h1>
        <div class="subtitle">
            Physics - Characteristics of Light<br>
            <span class="teacher">Teacher: Aalia Shaheen - JIS</span>
        </div>

        <div class="buttons">
            <a href="/student.html" class="btn btn-student">
                👨‍🎓 I'm a Student
            </a>
            <a href="/teacher.html" class="btn btn-teacher">
                👩‍🏫 I'm the Teacher
            </a>
        </div>

        <div class="info">
            <strong>Students:</strong> Click the blue button to start your adaptive learning journey<br><br>
            <strong>Teacher:</strong> Click the green button to access the live monitoring dashboard
        </div>
    </div>
</body>
</html>
