<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIS Adaptive Learning System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            background: linear-gradient(135deg, #1a365d, #2c5282);
            color: white;
            border-radius: 20px;
            padding: 50px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .header h1 { font-size: 3rem; margin-bottom: 15px; }
        .header .subtitle { font-size: 1.3rem; opacity: 0.9; margin-bottom: 10px; }
        .header .teacher { color: #fbd38d; font-weight: 700; font-size: 1.2rem; }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 40px;
        }

        .role-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .role-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .role-card.student { border: 4px solid #2c5282; }
        .role-card.teacher { border: 4px solid #38a169; }

        .role-emoji { font-size: 5rem; margin-bottom: 20px; }
        .role-title { font-size: 2rem; font-weight: 700; color: #1a365d; margin-bottom: 10px; }
        .role-desc { color: #718096; font-size: 1.1rem; }

        .topics-section {
            display: none;
        }

        .topics-section.show { display: block; }

        .back-btn {
            background: linear-gradient(135deg, #4a5568, #2d3748);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.3);
        }

        .grade-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .grade-tab {
            background: white;
            color: #1a365d;
            border: 3px solid transparent;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .grade-tab:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        .grade-tab.active {
            background: linear-gradient(135deg, #ed8936, #d69e2e);
            color: white;
            border-color: #ed8936;
        }

        .grade-tab.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .grade-content {
            display: none;
        }

        .grade-content.active { display: block; }

        .grade-header {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .grade-header h2 {
            font-size: 2.2rem;
            color: #1a365d;
            margin-bottom: 10px;
        }

        .grade-header p {
            color: #718096;
            font-size: 1.1rem;
        }

        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .topic-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 3px solid transparent;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .topic-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
            border-color: #ed8936;
        }

        .topic-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f7fafc;
        }

        .topic-card.disabled:hover {
            transform: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-color: transparent;
        }

        .topic-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .topic-number {
            background: linear-gradient(135deg, #ed8936, #d69e2e);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .topic-card.disabled .topic-number {
            background: #cbd5e0;
        }

        .topic-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a365d;
            line-height: 1.3;
        }

        .topic-status {
            margin-top: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            text-align: center;
        }

        .status-available {
            background: linear-gradient(135deg, #c6f6d5, #9ae6b4);
            color: #22543d;
        }

        .status-coming {
            background: linear-gradient(135deg, #feebc8, #fbd38d);
            color: #7c2d12;
        }

        .empty-state {
            background: white;
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .empty-state .emoji { font-size: 5rem; margin-bottom: 20px; }
        .empty-state h3 { font-size: 1.8rem; color: #1a365d; margin-bottom: 15px; }
        .empty-state p { color: #718096; font-size: 1.1rem; }

        @media (max-width: 768px) {
            .role-selector { grid-template-columns: 1fr; }
            .topics-grid { grid-template-columns: 1fr; }
            .grade-tabs { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Adaptive Learning System</h1>
            <div class="subtitle">Interactive Physics Learning Platform</div>
            <div class="teacher">Teacher: Aalia Shaheen - Jubail International School</div>
        </div>

        <!-- ROLE SELECTOR -->
        <div id="roleSelector" class="role-selector">
            <div class="role-card student" onclick="showTopics()">
                <div class="role-emoji">👨‍🎓</div>
                <div class="role-title">I'm a Student</div>
                <div class="role-desc">Start your adaptive learning journey</div>
            </div>

            <div class="role-card teacher" onclick="window.location.href='/teacher.html'">
                <div class="role-emoji">👩‍🏫</div>
                <div class="role-title">I'm the Teacher</div>
                <div class="role-desc">View live monitoring dashboard</div>
            </div>
        </div>

        <!-- TOPICS SECTION -->
        <div id="topicsSection" class="topics-section">
            <button class="back-btn" onclick="showRoles()">← Back to Home</button>

            <!-- GRADE TABS -->
            <div class="grade-tabs" id="gradeTabs"></div>

            <!-- GRADE CONTENTS -->
            <div id="gradeContents"></div>
        </div>
    </div>

    <script>
        let config = null;
        let currentGrade = 10;

        async function loadConfig() {
            try {
                const response = await fetch('/config.json');
                config = await response.json();
                renderGradeTabs();
                renderGradeContents();
            } catch (error) {
                console.error('Error loading config:', error);
                // Fallback config
                config = {
                    grades: {
                        "10": {
                            name: "Grade 10",
                            enabled: true,
                            subjects: {
                                physics: {
                                    topics: [
                                        {
                                            id: "g10-physics-ch13",
                                            chapter: "13",
                                            title: "Characteristics of Light",
                                            file: "student.html",
                                            enabled: true
                                        }
                                    ]
                                }
                            }
                        },
                        "9": { name: "Grade 9", enabled: false, subjects: { physics: { topics: [] }}},
                        "11": { name: "Grade 11", enabled: false, subjects: { physics: { topics: [] }}}
                    }
                };
                renderGradeTabs();
                renderGradeContents();
            }
        }

        function showRoles() {
            document.getElementById('roleSelector').style.display = 'grid';
            document.getElementById('topicsSection').classList.remove('show');
        }

        function showTopics() {
            document.getElementById('roleSelector').style.display = 'none';
            document.getElementById('topicsSection').classList.add('show');
            if (!config) loadConfig();
        }

        function renderGradeTabs() {
            const container = document.getElementById('gradeTabs');
            container.innerHTML = '';

            for (let gradeNum in config.grades) {
                const grade = config.grades[gradeNum];
                const tab = document.createElement('div');
                tab.className = 'grade-tab';
                
                if (!grade.enabled) {
                    tab.classList.add('disabled');
                }
                
                if (parseInt(gradeNum) === currentGrade) {
                    tab.classList.add('active');
                }

                tab.textContent = grade.name;
                tab.dataset.grade = gradeNum;
                
                if (grade.enabled) {
                    tab.onclick = () => switchGrade(parseInt(gradeNum));
                }

                container.appendChild(tab);
            }
        }

        function switchGrade(gradeNum) {
            currentGrade = gradeNum;
            
            // Update tabs
            document.querySelectorAll('.grade-tab').forEach(tab => {
                tab.classList.remove('active');
                if (parseInt(tab.dataset.grade) === gradeNum) {
                    tab.classList.add('active');
                }
            });

            // Update content
            document.querySelectorAll('.grade-content').forEach(content => {
                content.classList.remove('active');
                if (parseInt(content.dataset.grade) === gradeNum) {
                    content.classList.add('active');
                }
            });
        }

        function renderGradeContents() {
            const container = document.getElementById('gradeContents');
            container.innerHTML = '';

            for (let gradeNum in config.grades) {
                const grade = config.grades[gradeNum];
                const gradeContent = document.createElement('div');
                gradeContent.className = 'grade-content';
                gradeContent.dataset.grade = gradeNum;
                
                if (parseInt(gradeNum) === currentGrade) {
                    gradeContent.classList.add('active');
                }

                if (!grade.enabled) {
                    gradeContent.innerHTML = `
                        <div class="empty-state">
                            <div class="emoji">🔒</div>
                            <h3>${grade.name} Content Coming Soon!</h3>
                            <p>This grade will be available in the future. Stay tuned!</p>
                        </div>
                    `;
                } else {
                    const topics = grade.subjects.physics.topics || [];
                    
                    gradeContent.innerHTML = `
                        <div class="grade-header">
                            <h2>${grade.name} - Physics</h2>
                            <p>Select a topic to begin your adaptive learning journey</p>
                        </div>
                        <div class="topics-grid">
                            ${topics.length === 0 ? `
                                <div class="empty-state">
                                    <div class="emoji">📭</div>
                                    <h3>No Topics Available Yet</h3>
                                    <p>Topics will appear here once your teacher adds them.</p>
                                </div>
                            ` : topics.map(topic => `
                                ${topic.enabled ? `
                                    <a href="/${topic.file}" class="topic-card">
                                        <div class="topic-header">
                                            <div class="topic-number">${topic.chapter}</div>
                                            <div class="topic-title">${topic.title}</div>
                                        </div>
                                        <div class="topic-status status-available">
                                            ✓ Available Now - Start Learning
                                        </div>
                                    </a>
                                ` : `
                                    <div class="topic-card disabled">
                                        <div class="topic-header">
                                            <div class="topic-number">${topic.chapter}</div>
                                            <div class="topic-title">${topic.title}</div>
                                        </div>
                                        <div class="topic-status status-coming">
                                            ⏳ Coming Soon
                                        </div>
                                    </div>
                                `}
                            `).join('')}
                        </div>
                    `;
                }

                container.appendChild(gradeContent);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadConfig);
    </script>
</body>
</html>
