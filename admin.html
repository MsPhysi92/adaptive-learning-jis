<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - JIS Adaptive Learning</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            min-height: 100vh;
            color: #fff;
        }

        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: white;
            color: #1a202c;
            border-radius: 16px;
            padding: 50px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .login-box h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #1a365d;
        }

        .login-box p {
            color: #718096;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #1a365d;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ed8936;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ed8936, #d69e2e);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .admin-panel {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .admin-panel.active {
            display: block;
        }

        .header {
            background: linear-gradient(135deg, #1a365d, #2c5282);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2rem;
        }

        .btn-logout {
            background: #e53e3e;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: #c53030;
        }

        .section {
            background: white;
            color: #1a202c;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section h2 {
            color: #1a365d;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #ed8936;
        }

        .upload-zone {
            border: 3px dashed #cbd5e0;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #f7fafc;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-zone:hover {
            border-color: #ed8936;
            background: #fff;
        }

        .upload-zone.dragover {
            border-color: #38a169;
            background: #f0fff4;
        }

        .topic-list {
            margin-top: 20px;
        }

        .topic-item {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topic-info {
            flex: 1;
        }

        .topic-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a365d;
            margin-bottom: 5px;
        }

        .topic-meta {
            color: #718096;
            font-size: 0.9rem;
        }

        .topic-actions {
            display: flex;
            gap: 10px;
        }

        .toggle {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e0;
            transition: 0.4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #38a169;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .btn-sm {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: #3182ce;
            color: white;
        }

        .btn-delete {
            background: #e53e3e;
            color: white;
        }

        .btn-sm:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .grade-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .grade-tab {
            padding: 12px 24px;
            background: #e2e8f0;
            color: #1a365d;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .grade-tab.active {
            background: linear-gradient(135deg, #ed8936, #d69e2e);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #38a169;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #e53e3e;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .topic-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .topic-actions {
                margin-top: 15px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>🔐 Admin Panel</h1>
            <p>JIS Adaptive Learning System</p>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword" placeholder="Enter admin password">
            </div>
            
            <button class="btn" onclick="login()">Login</button>
            
            <div id="loginError" style="margin-top: 15px; color: #e53e3e; display: none;">
                ❌ Incorrect password
            </div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="admin-panel">
        <div class="header">
            <div>
                <h1>📚 Admin Dashboard</h1>
                <p style="opacity: 0.9; margin-top: 5px;">JIS Adaptive Learning Management</p>
            </div>
            <div class="btn-logout" onclick="logout()">Logout</div>
        </div>

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Total Topics</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statActive">0</div>
                <div class="stat-label">Active Topics</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statGrades">3</div>
                <div class="stat-label">Grades</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statStudents">0</div>
                <div class="stat-label">Total Students</div>
            </div>
        </div>

        <!-- ALERTS -->
        <div id="alertContainer"></div>

        <!-- UPLOAD SECTION -->
        <div class="section">
            <h2>📤 Upload New Topic</h2>
            
            <div class="form-group">
                <label>Select Grade</label>
                <select id="uploadGrade" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                    <option value="10">Grade 10</option>
                    <option value="9">Grade 9</option>
                    <option value="11">Grade 11</option>
                </select>
            </div>

            <div class="form-group">
                <label>Chapter Number</label>
                <input type="number" id="uploadChapter" placeholder="e.g., 14" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
            </div>

            <div class="form-group">
                <label>Topic Title</label>
                <input type="text" id="uploadTitle" placeholder="e.g., Reflection of Light" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
            </div>

            <div class="upload-zone" id="uploadZone">
                <div style="font-size: 3rem; margin-bottom: 10px;">📄</div>
                <div style="font-size: 1.2rem; font-weight: 600; color: #1a365d; margin-bottom: 10px;">
                    Drop HTML file here or click to browse
                </div>
                <div style="color: #718096;">
                    Accepted: .html files only
                </div>
                <input type="file" id="fileInput" accept=".html" style="display: none;">
            </div>

            <button class="btn" onclick="uploadTopic()" style="margin-top: 20px;">
                ✅ Upload & Activate Topic
            </button>
        </div>

        <!-- MANAGE TOPICS -->
        <div class="section">
            <h2>📋 Manage Topics</h2>
            
            <div class="grade-tabs">
                <button class="grade-tab active" data-grade="10" onclick="switchGrade(10)">Grade 10</button>
                <button class="grade-tab" data-grade="9" onclick="switchGrade(9)">Grade 9</button>
                <button class="grade-tab" data-grade="11" onclick="switchGrade(11)">Grade 11</button>
            </div>

            <div id="topicList" class="topic-list"></div>
        </div>
    </div>

    <script>
        let config = null;
        let currentGrade = 10;

        // Load config from server
        async function loadConfig() {
            try {
                const response = await fetch('/config.json');
                config = await response.json();
                updateStats();
                renderTopics();
            } catch (error) {
                console.error('Error loading config:', error);
                config = getDefaultConfig();
            }
        }

        function getDefaultConfig() {
            return {
                "school": {
                    "name": "Jubail International School",
                    "abbreviation": "JIS",
                    "teacher": "Aalia Shaheen"
                },
                "adminPassword": "jis2024admin",
                "grades": {
                    "9": { "name": "Grade 9", "enabled": false, "subjects": { "physics": { "name": "Physics", "topics": [] }}},
                    "10": { "name": "Grade 10", "enabled": true, "subjects": { "physics": { "name": "Physics", "topics": []}}},
                    "11": { "name": "Grade 11", "enabled": false, "subjects": { "physics": { "name": "Physics", "topics": []}}}
                }
            };
        }

        function login() {
            const password = document.getElementById('adminPassword').value;
            const correctPassword = config ? config.adminPassword : 'jis2024admin';
            
            if (password === correctPassword) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');
                loadConfig();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('adminPassword').value = '';
        }

        function updateStats() {
            if (!config) return;
            
            let totalTopics = 0;
            let activeTopics = 0;
            
            for (let grade in config.grades) {
                const gradeData = config.grades[grade];
                if (gradeData.subjects && gradeData.subjects.physics) {
                    totalTopics += gradeData.subjects.physics.topics.length;
                    activeTopics += gradeData.subjects.physics.topics.filter(t => t.enabled).length;
                }
            }
            
            document.getElementById('statTotal').textContent = totalTopics;
            document.getElementById('statActive').textContent = activeTopics;
        }

        function switchGrade(grade) {
            currentGrade = grade;
            document.querySelectorAll('.grade-tab').forEach(tab => {
                tab.classList.remove('active');
                if (parseInt(tab.dataset.grade) === grade) {
                    tab.classList.add('active');
                }
            });
            renderTopics();
        }

        function renderTopics() {
            if (!config) return;
            
            const container = document.getElementById('topicList');
            const gradeData = config.grades[currentGrade];
            
            if (!gradeData || !gradeData.subjects || !gradeData.subjects.physics || !gradeData.subjects.physics.topics.length) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #718096;">
                        <div style="font-size: 3rem; margin-bottom: 15px;">📭</div>
                        <div style="font-size: 1.2rem;">No topics yet for Grade ${currentGrade}</div>
                        <div style="margin-top: 10px;">Upload your first topic above!</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = gradeData.subjects.physics.topics.map(topic => `
                <div class="topic-item">
                    <div class="topic-info">
                        <div class="topic-title">Ch ${topic.chapter}: ${topic.title}</div>
                        <div class="topic-meta">
                            File: ${topic.file} | Added: ${topic.dateAdded || 'Unknown'}
                        </div>
                    </div>
                    <div class="topic-actions">
                        <label class="toggle">
                            <input type="checkbox" ${topic.enabled ? 'checked' : ''} onchange="toggleTopic('${topic.id}', this.checked)">
                            <span class="slider"></span>
                        </label>
                        <button class="btn-sm btn-edit" onclick="editTopic('${topic.id}')">Edit</button>
                        <button class="btn-sm btn-delete" onclick="deleteTopic('${topic.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleTopic(topicId, enabled) {
            if (!config) return;
            
            for (let grade in config.grades) {
                const topics = config.grades[grade].subjects.physics.topics;
                const topic = topics.find(t => t.id === topicId);
                if (topic) {
                    topic.enabled = enabled;
                    saveConfig();
                    showAlert(`Topic ${enabled ? 'enabled' : 'disabled'} successfully!`, 'success');
                    updateStats();
                    break;
                }
            }
        }

        function deleteTopic(topicId) {
            if (!confirm('Are you sure you want to delete this topic?')) return;
            
            for (let grade in config.grades) {
                const topics = config.grades[grade].subjects.physics.topics;
                const index = topics.findIndex(t => t.id === topicId);
                if (index !== -1) {
                    topics.splice(index, 1);
                    saveConfig();
                    renderTopics();
                    updateStats();
                    showAlert('Topic deleted successfully!', 'success');
                    break;
                }
            }
        }

        function uploadTopic() {
            const grade = document.getElementById('uploadGrade').value;
            const chapter = document.getElementById('uploadChapter').value;
            const title = document.getElementById('uploadTitle').value;
            const fileInput = document.getElementById('fileInput');
            
            if (!chapter || !title || !fileInput.files.length) {
                showAlert('Please fill all fields and select a file!', 'error');
                return;
            }
            
            const file = fileInput.files[0];
            const fileName = `grade-${grade}-ch${chapter}-${title.toLowerCase().replace(/\s+/g, '-')}.html`;
            
            // Create new topic
            const newTopic = {
                id: `g${grade}-physics-ch${chapter}`,
                chapter: chapter,
                title: title,
                file: fileName,
                enabled: true,
                minQuestions: 10,
                maxQuestions: 20,
                diagnosticQuestions: 5,
                dateAdded: new Date().toISOString().split('T')[0]
            };
            
            // Add to config
            if (!config.grades[grade].subjects.physics.topics) {
                config.grades[grade].subjects.physics.topics = [];
            }
            config.grades[grade].subjects.physics.topics.push(newTopic);
            
            // Save config
            saveConfig();
            
            // Clear form
            document.getElementById('uploadChapter').value = '';
            document.getElementById('uploadTitle').value = '';
            fileInput.value = '';
            
            // Refresh display
            switchGrade(parseInt(grade));
            updateStats();
            
            showAlert(`Topic "${title}" uploaded successfully! File saved as: ${fileName}`, 'success');
            
            // In real implementation, you'd upload the file to server here
            console.log('File to upload:', file, 'as', fileName);
        }

        function saveConfig() {
            // In real implementation, this would POST to server
            // For now, just save to localStorage
            localStorage.setItem('adminConfig', JSON.stringify(config));
            console.log('Config saved:', config);
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.appendChild(alert);
            
            setTimeout(() => alert.remove(), 5000);
        }

        // File upload handling
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                showAlert('File selected: ' + e.dataTransfer.files[0].name, 'success');
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                showAlert('File selected: ' + fileInput.files[0].name, 'success');
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Try to load config from localStorage first
            const savedConfig = localStorage.getItem('adminConfig');
            if (savedConfig) {
                config = JSON.parse(savedConfig);
            } else {
                loadConfig();
            }
        });
    </script>
</body>
</html>
