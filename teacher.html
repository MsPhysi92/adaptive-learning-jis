<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Live Monitoring</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1a365d;
            --secondary: #2c5282;
            --accent: #ed8936;
            --success: #38a169;
            --warning: #d69e2e;
            --danger: #e53e3e;
            --light: #f7fafc;
            --dark: #1a202c;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, var(--success), #48bb78);
            color: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .header h1 { font-size: 2.2rem; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 1.1rem; }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 12px 24px;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #e53e3e;
            animation: pulse 2s infinite;
        }

        .status-dot.connected { background: #38a169; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .student-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .student-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
        }

        .student-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .student-name {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .student-id {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .screen-preview {
            height: 200px;
            background: linear-gradient(135deg, #f7fafc, #e2e8f0);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-bottom: 2px solid var(--border);
        }

        .screen-preview.active {
            background: linear-gradient(135deg, #e6fffa, #b2f5ea);
        }

        .screen-info {
            text-align: center;
            color: var(--text-light);
        }

        .screen-info.active {
            color: var(--primary);
            font-weight: 600;
        }

        .student-stats {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-item {
            background: var(--light);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-name {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        .level-badge {
            display: inline-block;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .level-basic { background: linear-gradient(135deg, #bee3f8, #90cdf4); color: #2c5282; }
        .level-intermediate { background: linear-gradient(135deg, #fbd38d, #f6ad55); color: #7c2d12; }
        .level-advanced { background: linear-gradient(135deg, #fc8181, #f56565); color: #742a2a; }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .status-active { background: #c6f6d5; color: #22543d; }
        .status-complete { background: #bee3f8; color: #2c5282; }
        .status-offline { background: #fed7d7; color: #742a2a; }

        .notifications {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
        }

        .notification {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .notification.success { border-left: 4px solid var(--success); }
        .notification.warning { border-left: 4px solid var(--warning); }
        .notification.info { border-left: 4px solid var(--primary); }

        .notification-time {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 5px;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-success { background: linear-gradient(135deg, var(--success), #48bb78); color: white; }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #fc8181); color: white; }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); }

        .empty-state {
            background: white;
            padding: 60px 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .empty-state h2 { color: var(--primary); margin-bottom: 15px; }
        .empty-state p { color: var(--text-light); font-size: 1.1rem; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.8rem;
            color: var(--primary);
            font-weight: 700;
        }

        .close-btn {
            background: var(--danger);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .journey-timeline {
            margin-top: 20px;
        }

        .timeline-item {
            padding: 15px;
            margin: 10px 0;
            background: var(--light);
            border-left: 4px solid var(--accent);
            border-radius: 8px;
        }

        .timeline-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .timeline-detail {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .stats-bar { grid-template-columns: 1fr 1fr; }
            .students-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="connection-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Connecting...</span>
    </div>

    <div class="header">
        <h1>📊 Teacher Dashboard - Live Monitoring</h1>
        <p>Aalia Shaheen - JIS | Real-time Student Tracking</p>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-number" id="totalStudents">0</div>
            <div class="stat-label">Total Students</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="activeStudents">0</div>
            <div class="stat-label">Active Now</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="completedStudents">0</div>
            <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="avgScore">0%</div>
            <div class="stat-label">Avg Score</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-success" onclick="refreshDashboard()">🔄 Refresh</button>
        <button class="btn btn-primary" onclick="exportAllReports()">📥 Export All</button>
        <button class="btn btn-primary" onclick="clearNotifications()">🔔 Clear Notifications</button>
    </div>

    <div id="studentsContainer" class="students-grid"></div>

    <div class="empty-state" id="emptyState">
        <h2>👋 Waiting for Students...</h2>
        <p>Students will appear here when they connect</p>
        <p style="margin-top: 20px; font-weight: 600;">Student URL: <span id="studentUrl" style="color: var(--accent);">Loading...</span></p>
    </div>

    <div class="notifications" id="notifications"></div>

    <div class="modal" id="studentModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Student Details</div>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let students = {};
        let notifications = [];

        // Determine WebSocket URL
        function getWebSocketUrl() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host;
            
            // Handle different environments
            if (!host || host === '') {
                // Fallback for local file opening
                return 'ws://localhost:3000';
            }
            
            return `${wsProtocol}//${host}`;
        }

        // Display student URL
        const studentUrlElement = document.getElementById('studentUrl');
        if (window.location.host) {
            studentUrlElement.textContent = `${window.location.origin}/student.html`;
        } else {
            studentUrlElement.textContent = 'http://localhost:3000/student.html';
        }

        function connectWebSocket() {
            const wsUrl = getWebSocketUrl();
            console.log('Teacher connecting to:', wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('Teacher dashboard connected');
                updateConnectionStatus(true);
                
                // Register as teacher
                ws.send(JSON.stringify({ type: 'register_teacher' }));
                
                // Request all current students
                ws.send(JSON.stringify({ type: 'request_all_students' }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            };

            ws.onclose = () => {
                console.log('Disconnected from server');
                updateConnectionStatus(false);
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateConnectionStatus(false);
            };
        }

        function updateConnectionStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (connected) {
                dot.classList.add('connected');
                text.textContent = 'Connected';
            } else {
                dot.classList.remove('connected');
                text.textContent = 'Reconnecting...';
            }
        }

        function handleServerMessage(data) {
            switch(data.type) {
                case 'all_students':
                    students = data.students;
                    renderDashboard();
                    break;
                    
                case 'new_student':
                    students[data.student.studentID] = data.student;
                    renderDashboard();
                    addNotification(`🎉 ${data.student.name} joined!`, 'success');
                    break;
                    
                case 'student_update':
                    if (students[data.studentID]) {
                        students[data.studentID] = { ...students[data.studentID], ...data.update };
                        renderDashboard();
                        
                        // Notify on level change
                        if (data.update.level) {
                            addNotification(`📊 ${students[data.studentID].name} - Level: ${data.update.level.toUpperCase()}`, 'info');
                        }
                        
                        // Notify on completion
                        if (data.update.status === 'Completed') {
                            addNotification(`✅ ${students[data.studentID].name} completed journey!`, 'success');
                        }
                        
                        // Notify on wrong answer
                        if (data.update.lastAnswer === 'Incorrect') {
                            addNotification(`⚠️ ${students[data.studentID].name} answered incorrectly`, 'warning');
                        }
                    }
                    break;
                    
                case 'screen_update':
                    if (students[data.studentID]) {
                        students[data.studentID].screenCapture = data.imageData;
                        renderDashboard();
                    }
                    break;
                    
                case 'student_disconnected':
                    if (students[data.studentID]) {
                        students[data.studentID].status = 'disconnected';
                        renderDashboard();
                        addNotification(`🔴 ${students[data.studentID].name} disconnected`, 'warning');
                    }
                    break;
            }
        }

        function renderDashboard() {
            const container = document.getElementById('studentsContainer');
            const emptyState = document.getElementById('emptyState');
            
            const studentArray = Object.values(students);
            
            if (studentArray.length === 0) {
                emptyState.style.display = 'block';
                container.style.display = 'none';
                return;
            }
            
            emptyState.style.display = 'none';
            container.style.display = 'grid';
            
            // Update stats
            const totalStudents = studentArray.length;
            const activeStudents = studentArray.filter(s => s.status !== 'disconnected' && s.currentPhase !== 'complete').length;
            const completedStudents = studentArray.filter(s => s.status === 'Completed').length;
            const avgScore = studentArray.length > 0 
                ? Math.round(studentArray.reduce((sum, s) => sum + (s.diagnosticScore || 0), 0) / studentArray.length)
                : 0;
            
            document.getElementById('totalStudents').textContent = totalStudents;
            document.getElementById('activeStudents').textContent = activeStudents;
            document.getElementById('completedStudents').textContent = completedStudents;
            document.getElementById('avgScore').textContent = avgScore + '%';
            
            // Render student cards
            container.innerHTML = studentArray.map(student => `
                <div class="student-card" onclick="showStudentDetails('${student.studentID}')">
                    <div class="student-header">
                        <div>
                            <div class="student-name">${student.name}</div>
                            <div class="student-id">${student.studentID} | ${student.class}</div>
                        </div>
                        <span class="status-badge status-${student.status === 'Completed' ? 'complete' : student.status === 'disconnected' ? 'offline' : 'active'}">
                            ${student.status === 'Completed' ? '✓ Done' : student.status === 'disconnected' ? 'Offline' : 'Active'}
                        </span>
                    </div>
                    
                    <div class="screen-preview ${student.status !== 'disconnected' ? 'active' : ''}">
                        <div class="screen-info ${student.status !== 'disconnected' ? 'active' : ''}">
                            <div style="font-size: 2rem; margin-bottom: 10px;">
                                ${getPhaseEmoji(student.currentPhase)}
                            </div>
                            <div style="font-weight: 600;">${getPhaseLabel(student.currentPhase)}</div>
                            ${student.currentQuestion ? `<div style="margin-top: 5px;">Question ${student.currentQuestion}</div>` : ''}
                            ${student.lastAnswer ? `<div style="margin-top: 5px; color: ${student.lastAnswer === 'Correct' ? 'var(--success)' : 'var(--danger)'};">${student.lastAnswer}</div>` : ''}
                        </div>
                    </div>
                    
                    <div class="student-stats">
                        <div class="stat-item">
                            <div class="stat-value">${student.diagnosticScore || 0}%</div>
                            <div class="stat-name">Score</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">
                                <span class="level-badge level-${student.level || 'basic'}">${(student.level || 'basic').toUpperCase()}</span>
                            </div>
                            <div class="stat-name">Level</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getPhaseEmoji(phase) {
            const emojis = {
                'registration': '📝',
                'diagnostic': '📊',
                'learning': '📚',
                'core': '🎯',
                'complete': '🎉'
            };
            return emojis[phase] || '📍';
        }

        function getPhaseLabel(phase) {
            const labels = {
                'registration': 'Registering',
                'diagnostic': 'Diagnostic Test',
                'learning': 'Learning Path',
                'core': 'Core Instruction',
                'complete': 'Completed'
            };
            return labels[phase] || phase;
        }

        function showStudentDetails(studentID) {
            const student = students[studentID];
            if (!student) return;
            
            const modal = document.getElementById('studentModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            modalTitle.textContent = `${student.name} - Complete Journey`;
            
            modalBody.innerHTML = `
                <div style="background: var(--light); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                    <h3 style="color: var(--primary); margin-bottom: 15px;">Student Information</h3>
                    <p><strong>Name:</strong> ${student.name}</p>
                    <p><strong>ID:</strong> ${student.studentID}</p>
                    <p><strong>Class:</strong> ${student.class}</p>
                    <p><strong>Email:</strong> ${student.email || 'N/A'}</p>
                    <p><strong>Connected:</strong> ${new Date(student.connectedAt).toLocaleString()}</p>
                    <p><strong>Last Update:</strong> ${new Date(student.lastUpdate).toLocaleString()}</p>
                </div>
                
                <div style="background: var(--light); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                    <h3 style="color: var(--primary); margin-bottom: 15px;">Current Status</h3>
                    <p><strong>Phase:</strong> ${getPhaseLabel(student.currentPhase)}</p>
                    <p><strong>Level:</strong> <span class="level-badge level-${student.level}">${(student.level || 'basic').toUpperCase()}</span></p>
                    <p><strong>Diagnostic Score:</strong> ${student.diagnosticScore || 0}%</p>
                    <p><strong>Status:</strong> ${student.status || 'Active'}</p>
                </div>
                
                <div style="margin-top: 20px;">
                    <button class="btn btn-primary" onclick="exportStudentPDF('${studentID}')" style="margin-right: 10px;">📄 Generate PDF Report</button>
                    <button class="btn btn-primary" onclick="exportStudentReport('${studentID}')" style="margin-right: 10px;">📥 Export TXT</button>
                    <button class="btn btn-success" onclick="emailStudentReport('${studentID}')">📧 Email Report</button>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('studentModal').classList.remove('active');
        }

        function addNotification(message, type = 'info') {
            const container = document.getElementById('notifications');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <div>${message}</div>
                <div class="notification-time">${new Date().toLocaleTimeString()}</div>
            `;
            
            container.insertBefore(notification, container.firstChild);
            
            // Keep only last 10 notifications
            while (container.children.length > 10) {
                container.removeChild(container.lastChild);
            }
            
            // Auto-remove after 10 seconds
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.remove();
                }
            }, 10000);
        }

        function refreshDashboard() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'request_all_students' }));
                addNotification('🔄 Dashboard refreshed', 'info');
            }
        }

        function clearNotifications() {
            document.getElementById('notifications').innerHTML = '';
        }

        function exportAllReports() {
            let report = '═══════════════════════════════════════════\n';
            report += 'ADAPTIVE LEARNING - ALL STUDENTS REPORT\n';
            report += 'Generated: ' + new Date().toLocaleString() + '\n';
            report += '═══════════════════════════════════════════\n\n';
            
            Object.values(students).forEach(student => {
                report += generateStudentReport(student);
                report += '\n' + '─'.repeat(80) + '\n\n';
            });
            
            downloadReport(report, 'all-students-report.txt');
            addNotification('✅ All reports exported', 'success');
        }

        function exportStudentReport(studentID) {
            const student = students[studentID];
            const report = generateStudentReport(student);
            downloadReport(report, `${student.name.replace(/\s+/g, '-')}-report.txt`);
            addNotification(`✅ Report exported for ${student.name}`, 'success');
        }

        async function exportStudentPDF(studentID) {
            try {
                const response = await fetch('/api/generate-pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ studentID: studentID })
                });
                
                if (!response.ok) throw new Error('PDF generation failed');
                
                const html = await response.text();
                
                // Open in new window for printing
                const printWindow = window.open('', '_blank');
                printWindow.document.write(html);
                printWindow.document.close();
                
                // Auto-trigger print dialog
                setTimeout(() => {
                    printWindow.print();
                }, 500);
                
                addNotification(`📄 PDF opened for ${students[studentID].name}`, 'success');
            } catch (error) {
                console.error('PDF export error:', error);
                addNotification(`❌ Failed to generate PDF`, 'error');
            }
        }

        function emailStudentReport(studentID) {
            const student = students[studentID];
            const report = generateStudentReport(student);
            const subject = `Learning Report - ${student.name}`;
            const mailtoLink = `mailto:aalia.shaheen@jis.ae?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(report)}`;
            window.location.href = mailtoLink;
            addNotification(`📧 Email opened for ${student.name}`, 'info');
        }

        function generateStudentReport(student) {
            let report = `STUDENT: ${student.name}\n`;
            report += `ID: ${student.studentID} | Class: ${student.class}\n`;
            report += `Email: ${student.email || 'N/A'}\n`;
            report += `Connected: ${new Date(student.connectedAt).toLocaleString()}\n\n`;
            report += `CURRENT STATUS:\n`;
            report += `- Phase: ${getPhaseLabel(student.currentPhase)}\n`;
            report += `- Level: ${(student.level || 'basic').toUpperCase()}\n`;
            report += `- Diagnostic Score: ${student.diagnosticScore || 0}%\n`;
            report += `- Status: ${student.status || 'Active'}\n`;
            report += `- Last Update: ${new Date(student.lastUpdate).toLocaleString()}\n\n`;
            return report;
        }

        function downloadReport(content, filename) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Initialize
        connectWebSocket();
        
        // Auto-refresh every 30 seconds
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'request_all_students' }));
            }
        }, 30000);
    </script>
</body>
</html>
